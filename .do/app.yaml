# DigitalOcean App Platform Specification
# Website only - no database, no worker, no Redis
# openpmkit runs locally on user machines

name: openpmkit-web

services:
  - name: web
    github:
      repo: openpmkit/openpmkit
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm install && npm run build --workspace=apps/web
    run_command: npm run start --workspace=apps/web
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
