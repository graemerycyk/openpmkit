# DigitalOcean App Platform Specification
# https://docs.digitalocean.com/products/app-platform/reference/app-spec/
#
# To deploy:
# 1. Push this repo to GitHub
# 2. Go to https://cloud.digitalocean.com/apps
# 3. Create App > Import from GitHub
# 4. Select this repo
# 5. DO will auto-detect this app.yaml
# 6. Configure environment variables
# 7. Deploy!

name: pmkit
region: sfo

# ============================================
# WEB SERVICE (Next.js frontend)
# ============================================
services:
  - name: web
    dockerfile_path: apps/web/Dockerfile
    github:
      branch: prod
      deploy_on_push: true
      # repo: your-github-username/pmkit
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs  # $5/mo - upgrade as needed
    routes:
      - path: /
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 10
    envs:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        scope: RUN_TIME
        type: SECRET
      - key: NEXTAUTH_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: CONNECTOR_ENCRYPTION_KEY
        scope: RUN_TIME
        type: SECRET
      - key: OPENAI_API_KEY_PROD
        scope: RUN_TIME
        type: SECRET
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET

# ============================================
# WORKER SERVICE (BullMQ job processor)
# ============================================
workers:
  - name: worker
    dockerfile_path: docker/Dockerfile.worker
    github:
      branch: prod
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xxs  # $5/mo - upgrade as needed
    envs:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
      - key: OPENAI_API_KEY_PROD
        scope: RUN_TIME
        type: SECRET

# ============================================
# DOMAIN (Optional)
# ============================================
